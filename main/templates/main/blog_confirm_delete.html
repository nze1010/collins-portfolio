{% extends 'main/base.html' %}

{% block title %}Delete Article | CollinsTechEmpire{% endblock %}

{% block content %}
<section class="section-block destructive-page"><div class="shell form-shell"><div class="confirmation-card glass-card"><span class="eyebrow">Permanent action</span><h1>Delete this article?</h1><p>You are about to permanently delete “<strong>{{ post.title }}</strong>”. This action cannot be undone.</p><form method="post">{% csrf_token %}<div class="form-actions"><button type="submit" class="button button-danger">Yes, delete article</button><a href="{% url 'blog_detail' post.pk %}" class="button button-secondary">Cancel</a></div></form></div></div></section>
{% endblock %}
